version: '3.8'

services:
  ingestion:
    build: .
    container_name: youtube-transcription-ingestion
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - OUTPUT_FOLDER=/app/transcripts
      - DB_PATH=/app/transcripts.db
      - LOG_LEVEL=INFO
    volumes:
      - ./transcripts:/app/transcripts
      - ./transcripts.db:/app/transcripts.db
    ports:
      - "8000:8000"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

